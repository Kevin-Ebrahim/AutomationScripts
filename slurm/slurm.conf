###############################################################################
#                          BASIC SLURM CONFIGURATION                          #
###############################################################################
ClusterName=<cluster name>
SlurmctldHost=<headnode>
SlurmUser=slurm

# Process Tracking
ProctrackType=proctrack/cgroup

# Ports and Paths
SlurmctldPort=6817
SlurmdPort=6818
SlurmctldPidFile=/var/run/slurmctld.pid
SlurmdPidFile=/var/run/slurmd.pid
SlurmdSpoolDir=/var/spool/slurmd
StateSaveLocation=/var/spool/slurmctld

# Task Management
TaskPlugin=task/affinity,task/cgroup
TmpFS=/tmp

###############################################################################
#                             SCHEDULING & JOBS                              #
###############################################################################
# Node Selection
SelectType=select/cons_tres
SelectTypeParameters=CR_Core

# MPI
MpiDefault=pmix

# CPU Defaults
CpuFreqDef=Performance

# Job Priority
PriorityType=priority/basic
PriorityFavorSmall=YES

###############################################################################
#                              TIMEOUTS & LIMITS                             #
###############################################################################
InactiveLimit=0
KillWait=30
MinJobAge=300
SlurmctldTimeout=120
SlurmdTimeout=300
Waittime=0
ReturnToService=1

###############################################################################
#                          LOGGING & ACCOUNTING (DISABLED)                    #
###############################################################################
UsePAM=0
AccountingStorageType=accounting_storage/none
JobAcctGatherType=jobacct_gather/none
JobCompType=jobcomp/none

# Logging Paths
SlurmctldDebug=info
SlurmctldLogFile=/var/log/slurmctld.log
SlurmdDebug=info
SlurmdLogFile=/var/log/slurmd.log

###############################################################################
#                            COMPUTE NODE DEFINITIONS                         #
###############################################################################
NodeName=<headnode> CPUs=<cpus> Sockets=<sockets> CoresPerSocket=<core per socket> ThreadsPerCore=<threads per core> State=IDLE
NodeName=<compute[range]> CPUs=<cpus> Sockets=<sockets> CoresPerSocket=<core per socket> ThreadsPerCore=<threads per core> State=IDLE

###############################################################################
#                              PARTITION CONFIGURATION                        #
###############################################################################
PartitionName=<partition> Nodes=ALL Default=YES MaxTime=INFINITE State=UP
